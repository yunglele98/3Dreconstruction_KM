<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kensington Market HCD — 3D Planning Platform</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <style>
    :root {
      --bg: #1a1a2e;
      --card: #16213e;
      --text: #e0e0e0;
      --dim: #8888aa;
      --accent: #4fc3f7;
      --border: #2a2a4a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'SF Mono', 'Fira Code', monospace; background: var(--bg); color: var(--text); overflow: hidden; }
    #map { width: 100vw; height: 100vh; }

    /* Header bar */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: center; gap: 16px;
      padding: 8px 16px; background: rgba(26,26,46,0.92);
      border-bottom: 1px solid var(--border); backdrop-filter: blur(8px);
    }
    .header h1 { font-size: 14px; font-weight: 600; color: var(--accent); white-space: nowrap; }
    .header .stat { font-size: 11px; color: var(--dim); }
    .header .stat b { color: var(--text); }

    /* Controls */
    .controls {
      position: fixed; top: 48px; left: 12px; z-index: 10;
      display: flex; flex-direction: column; gap: 6px; width: 220px;
    }
    .controls select, .controls input {
      width: 100%; padding: 6px 8px; font-size: 11px;
      background: var(--card); color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; outline: none; font-family: inherit;
    }

    /* Legend */
    .legend {
      position: fixed; bottom: 12px; left: 12px; z-index: 10;
      background: rgba(22,33,62,0.92); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; backdrop-filter: blur(8px);
    }

    /* Scenario pills */
    .scenario-bar {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .pill {
      padding: 4px 10px; font-size: 10px; border-radius: 12px;
      background: var(--card); border: 1px solid var(--border);
      color: var(--dim); cursor: pointer; font-family: inherit;
      transition: all 0.15s;
    }
    .pill:hover { border-color: var(--accent); color: var(--text); }
    .pill.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }

    /* Side panel */
    .panel {
      position: fixed; top: 48px; right: 0; bottom: 0; width: 340px; z-index: 10;
      background: rgba(22,33,62,0.95); border-left: 1px solid var(--border);
      overflow-y: auto; padding: 12px; backdrop-filter: blur(8px);
    }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .panel-header h2 { font-size: 12px; color: var(--accent); }
    #panel-close { cursor: pointer; color: var(--dim); font-size: 16px; }

    /* Building inspector */
    .building-header { margin-bottom: 12px; }
    .address { font-size: 14px; font-weight: 600; color: var(--text); }
    .badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 500; }
    .badge-contributing { background: #1a4a1a; color: #22c55e; }
    .badge-non-contributing { background: #4a1a1a; color: #ef4444; }
    .badge-era { background: #1a2a4a; color: #4fc3f7; }
    .badge-material { background: #3a2a1a; color: #d4a574; }
    .badge-condition-good { background: #1a4a1a; color: #22c55e; }
    .badge-condition-fair { background: #4a4a1a; color: #eab308; }
    .badge-condition-poor { background: #4a1a1a; color: #ef4444; }

    .section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); margin: 12px 0 6px; }
    .prop-table { width: 100%; font-size: 11px; border-collapse: collapse; }
    .prop-table td { padding: 3px 0; border-bottom: 1px solid var(--border); }
    .prop-table td:first-child { color: var(--dim); width: 40%; }

    .swatches { display: flex; gap: 12px; }
    .swatch { text-align: center; }
    .swatch-circle { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); margin: 0 auto 4px; }
    .swatch-label { font-size: 9px; color: var(--dim); }

    .image-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0; }
    .image-compare img { width: 100%; height: 140px; object-fit: cover; border-radius: 6px; }
    .img-label { font-size: 9px; color: var(--dim); text-align: center; margin-top: 2px; }

    .decorative-list { display: flex; flex-wrap: wrap; gap: 4px; }
    .decorative-tag { padding: 2px 6px; background: var(--card); border: 1px solid var(--border); border-radius: 3px; font-size: 9px; color: var(--dim); }

    .audit-score { display: flex; align-items: center; gap: 8px; }
    .audit-bar { flex: 1; height: 6px; background: var(--card); border-radius: 3px; overflow: hidden; }
    .audit-fill { height: 100%; border-radius: 3px; }
    .audit-value { font-size: 12px; font-weight: 600; }

    /* Bar charts */
    .bar-row { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
    .bar-label { font-size: 10px; color: var(--dim); width: 80px; text-align: right; }
    .bar { height: 10px; border-radius: 3px; min-width: 2px; }
    .bar-value { font-size: 10px; color: var(--text); }

    /* Building list */
    .building-list { max-height: 200px; overflow-y: auto; }
    .building-list-item {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 6px; cursor: pointer; border-radius: 4px; font-size: 10px;
    }
    .building-list-item:hover { background: var(--card); }
    .addr { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

    #export-btn {
      padding: 4px 10px; font-size: 10px; background: var(--card);
      border: 1px solid var(--border); border-radius: 4px; color: var(--dim);
      cursor: pointer; font-family: inherit;
    }
    #export-btn:hover { border-color: var(--accent); color: var(--text); }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>Kensington Market HCD</h1>
    <div class="stat">Buildings: <b id="s-buildings">—</b></div>
    <div class="stat">Contributing: <b id="s-contributing">—</b></div>
    <div class="stat">Renders: <b id="s-renders">—</b></div>
    <div class="stat">Photos: <b id="s-photos">—</b></div>
    <div style="flex:1"></div>
    <div class="scenario-bar">
      <button class="pill active" data-scenario="baseline">Baseline</button>
      <button class="pill" data-scenario="heritage_first">Heritage First</button>
      <button class="pill" data-scenario="gentle_density">Gentle Density</button>
      <button class="pill" data-scenario="mixed_use">Mixed Use</button>
      <button class="pill" data-scenario="green_infra">Green Infra</button>
      <button class="pill" data-scenario="mobility">Mobility</button>
    </div>
    <button id="export-btn">Export PNG</button>
  </div>

  <!-- Controls -->
  <div class="controls">
    <input id="filter-search" type="text" placeholder="Search address...">
    <select id="colour-mode">
      <option value="material">Colour by Material</option>
      <option value="heritage">Colour by Heritage</option>
      <option value="era">Colour by Era</option>
      <option value="condition">Colour by Condition</option>
      <option value="audit">Colour by Audit Score</option>
      <option value="roof">Colour by Roof Type</option>
    </select>
    <select id="filter-street"><option value="">All Streets</option></select>
    <div style="font-size:10px;color:var(--dim);margin-top:4px;">
      Buildings <span id="building-count-label"></span>
    </div>
    <div class="building-list" id="building-list"></div>
  </div>

  <!-- Legend -->
  <div class="legend" id="legend-items"></div>

  <!-- Map -->
  <div id="map"></div>

  <!-- Side panel -->
  <div class="panel">
    <div class="panel-header">
      <h2>Building Inspector</h2>
      <span id="panel-close">&times;</span>
    </div>
    <div id="panel-body">
      <p style="color:var(--dim);font-size:13px;">Click a building on the map to inspect it.</p>
    </div>
    <div class="section-title" style="margin-top:16px;">Era Distribution</div>
    <div id="era-chart"></div>
    <div class="section-title">Material Distribution</div>
    <div id="material-chart"></div>
  </div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
