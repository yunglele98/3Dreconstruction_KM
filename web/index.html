<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kensington Market 3D Planning Platform</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.0/dist/maplibre-gl.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #map { width: 100vw; height: 100vh; }
    #sidebar {
      position: absolute; top: 10px; left: 10px;
      background: rgba(255,255,255,0.95); border-radius: 8px;
      padding: 12px 16px; max-width: 320px; max-height: calc(100vh - 20px);
      overflow-y: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      font-size: 13px; z-index: 10;
    }
    #sidebar h1 { font-size: 16px; margin-bottom: 8px; }
    #sidebar h2 { font-size: 13px; margin: 8px 0 4px; color: #555; }
    #controls { margin: 8px 0; }
    #controls label { display: block; margin: 4px 0; cursor: pointer; }
    #building-info { margin-top: 8px; border-top: 1px solid #ddd; padding-top: 8px; }
    #building-info .field { margin: 2px 0; }
    #building-info .label { font-weight: 600; color: #333; }
    #stats { color: #666; font-size: 12px; margin-top: 4px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="sidebar">
    <h1>Kensington Market</h1>
    <div id="stats">Loading...</div>
    <div id="controls">
      <h2>Colour by</h2>
      <label><input type="radio" name="colour" value="material" checked> Material</label>
      <label><input type="radio" name="colour" value="era"> Era</label>
      <label><input type="radio" name="colour" value="condition"> Condition</label>
      <label><input type="radio" name="colour" value="heritage"> Heritage</label>
      <label><input type="radio" name="colour" value="roof"> Roof type</label>
    </div>
    <div id="building-info"></div>
  </div>
  <script type="module" src="/src/app.js"></script>
</body>
</html>
