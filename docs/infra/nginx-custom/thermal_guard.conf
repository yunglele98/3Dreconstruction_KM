# Thermal guard integration
# When CPU > 70%, the thermal_guard_nginx.py sidecar writes this flag file.
# Heavy inference routes (Ollama, Qdrant bulk) return 503 until load drops.
#
# Usage: include this in location blocks for inference-heavy proxy hosts.
#
# if (-f /data/nginx/custom/maintenance.flag) {
#     return 503 '{"error": "thermal_guard", "message": "CPU load > 70%, inference paused — retry in 30s"}';
# }
#
# NOTE: The above must be added manually in NPM's "Custom Nginx Configuration"
# text area for each proxy host that should respect the thermal guard.
