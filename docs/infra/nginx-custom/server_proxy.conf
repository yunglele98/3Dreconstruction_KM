# Rate limit zones for AI Automation Factory
# Applied globally — referenced in per-host location blocks

# Qdrant: 10 req/s per IP (vector search shouldn't burst higher)
limit_req_zone $binary_remote_addr zone=qdrant_limit:10m rate=10r/s;

# n8n webhooks: 20 req/s per IP (Gitea pushes, external triggers)
limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=20r/s;

# General API: 50 req/s per IP (dashboard, logs, monitor)
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=50r/s;
